version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: telemetry_postgres
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telemetry"]
      interval: 5s
      timeout: 3s
      retries: 15

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: telemetry_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 3s
      retries: 15

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: telemetry_api
    environment:
      PORT: 8080
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_QUEUE: telemetry_queue
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "8080:8080"

  middleware:
    build:
      context: .
      dockerfile: middleware/Dockerfile
    container_name: telemetry_middleware
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_QUEUE: telemetry_queue
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/telemetry?sslmode=disable
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  pgdata:
